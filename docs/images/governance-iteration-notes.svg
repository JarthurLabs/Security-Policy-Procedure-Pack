<svg xmlns="http://www.w3.org/2000/svg" width="940" height="400" viewBox="0 0 940 400">
  <rect width="940" height="400" fill="#fffbeb"/>
  <text x="45" y="50" font-family="Georgia, serif" font-size="28" fill="#1f2937">The project got better when the scope got smaller</text>
  <text x="47" y="80" font-family="Arial" font-size="14" fill="#4b5563">First idea: build a giant policy library. Better idea: build a few controls with owners and evidence.</text>

  <rect x="70" y="122" width="350" height="210" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="98" y="160" font-family="Arial" font-size="20" font-weight="bold" fill="#92400e">First version</text>
  <text x="98" y="198" font-family="Arial" font-size="15" fill="#1f2937">• More policies</text>
  <text x="98" y="226" font-family="Arial" font-size="15" fill="#1f2937">• More templates</text>
  <text x="98" y="254" font-family="Arial" font-size="15" fill="#1f2937">• More words</text>
  <text x="98" y="296" font-family="Arial" font-size="13" fill="#92400e">Problem: looked complete, but felt untested.</text>

  <path d="M455 225 C488 200, 510 202, 540 225" stroke="#78716c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M526 212 L542 226 L524 237" stroke="#78716c" stroke-width="3" fill="none" stroke-linecap="round"/>

  <rect x="565" y="112" width="310" height="230" rx="12" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/>
  <text x="592" y="150" font-family="Arial" font-size="20" font-weight="bold" fill="#166534">Improved version</text>
  <text x="592" y="190" font-family="Arial" font-size="15" fill="#1f2937">• Owner assigned</text>
  <text x="592" y="218" font-family="Arial" font-size="15" fill="#1f2937">• Procedure exists</text>
  <text x="592" y="246" font-family="Arial" font-size="15" fill="#1f2937">• Evidence identified</text>
  <text x="592" y="274" font-family="Arial" font-size="15" fill="#1f2937">• Review cadence documented</text>
  <text x="592" y="316" font-family="Arial" font-size="13" fill="#166534">Better: smaller, but usable.</text>
</svg>